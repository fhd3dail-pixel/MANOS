name: 🚀 Build MANOS APK Automatically\n\non:\n  push:\n    branches: [ main ]\n  workflow_dispatch:\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    \n    steps:\n    - uses: actions/checkout@v3\n    \n    - name: Set up Java\n      uses: actions/setup-java@v3\n      with:\n        java-version: '11'\n        distribution: 'adopt'\n    \n    - name: Set up Android SDK\n      uses: android-actions/setup-android@v2\n    \n    - name: Build APK\n      working-directory: ./frontend\n      run: |\n        chmod +x gradlew\n        ./gradlew assembleDebug\n    \n    - name: Upload APK to Release\n      uses: actions/upload-artifact@v3\n      with:\n        name: MANOS-APK\n        path: frontend/app/build/outputs/apk/debug/app-debug.apk\n    \n    - name: Create Release\n      uses: actions/create-release@v1\n      env:\n        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n      with:\n        tag_name: v1.0.0-${{ github.run_number }}\n        release_name: MANOS v1.0.0 Build ${{ github.run_number }}\n        body: |\n          # 🤖 MANOS Platform - APK Release\n          \n          صُنعت في العراق العظيم 🇮🇶\n          على يد: أمير الحشداوي\n          \n          ✅ APK جاهز للتحميل المباشر!\n          \n          ## الميزات:\n          - ✅ ذكاء اصطناعي حر بدون قيود\n          - ✅ تطوير ذاتي تلقائي\n          - ✅ لوحة تحكم ذكية\n          - ✅ 100% مجاني وحر\n          \n          ## كيفية التثبيت:\n          1. حمّل ملف APK\n          2. فعّل \"تثبيت من مصادر غير معروفة\"\n          3. ثبّت التطبيق\n          4. استمتع!\n          \n          Made with ❤️ in Iraq\n        draft: false\n        prerelease: false\n    \n    - name: Upload Release Asset\n      uses: actions/upload-release-asset@v1\n      env:\n        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n      with:\n        upload_url: ${{ steps.create_release.outputs.upload_url }}\n        asset_path: ./frontend/app/build/outputs/apk/debug/app-debug.apk\n        asset_name: MANOS-v1.0.0.apk\n        asset_content_type: application/vnd.android.package-archive\n"